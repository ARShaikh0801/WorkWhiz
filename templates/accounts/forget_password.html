{% load static %}
<!DOCTYPE html>
<html lang="{{ language|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — WorkWhiz</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% include 'partials/_google_translate.html' %}
</head>
<body style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;">
    <div class="form-card">
        <h1>Reset Password</h1>
        <p class="form-subtitle">Enter your email and we'll send you a reset link</p>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-buttons">
                <button type="submit" class="btn-primary" style="width:100%;">Send Reset Link</button>
                <p style="margin-top:16px;"><a href="{% url 'accounts:log_in' %}" class="btn-secondary">← Back to Sign In</a></p>
            </div>
        </form>
    </div>
</body>
</html>
