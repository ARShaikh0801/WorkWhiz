services:
  - type: web
    name: workwhiz
    env: python
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate --no-input; gunicorn WorkWhiz.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: WorkWhiz.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false  # Set manually — Supabase PostgreSQL connection string
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
    autoDeploy: true